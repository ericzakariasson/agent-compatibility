name: Publish to npm

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Resolve package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify npm publish secret is available
        if: ${{ secrets.NPM_TOKEN == '' && secrets.NODE_AUTH_TOKEN == '' && secrets.NPM_PUBLISH_TOKEN == '' }}
        run: |
          echo "Missing npm publish secret. Set NPM_TOKEN, NODE_AUTH_TOKEN, or NPM_PUBLISH_TOKEN."
          exit 1

      - name: Check whether this version is already published
        id: npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: ${{ steps.npm.outputs.already_published != 'true' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN || secrets.NPM_PUBLISH_TOKEN }}

      - name: Summarize skipped publish
        if: ${{ steps.npm.outputs.already_published == 'true' }}
        run: |
          echo "Skipped publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already on npm." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize published version
        if: ${{ steps.npm.outputs.already_published != 'true' }}
        run: |
          echo "Published ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
